services:
  redis:
    image: redis:alpine
    container_name: redis_stack
    ports:
      - "6379:6379"
    networks:
      - hackathon_network

  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: redis_insight
    ports:
      - "8001:8001"
    depends_on:
      - redis
    networks:
      - hackathon_network

networks:
  hackathon_network:
    driver: bridge
